name: CI

# Run on every push and on pull-requests targeting the umich branch.
on:
  push:
    branches: ["umich", "main"]
  pull_request:
    branches: ["umich", "main"]

env:
  # Which branch of mlibrary/dspace and mlibrary/dspace-angular to clone
  # inside the shared source image.
  GITHUB_BRANCH: umich
  # DSpace and JDK versions forwarded to docker compose build args.
  DSPACE_VERSION: "7.6"
  JDK_VERSION: "17"
  # Service URLs used by wait-for-stack.sh and smoke.sh.
  BACKEND_URL:  http://localhost:8080
  SOLR_URL:     http://localhost:8983
  FRONTEND_URL: http://localhost:4000
  # Give the heavyweight DSpace stack up to 10 minutes to become healthy.
  MAX_WAIT: 600

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 1: build the shared source image ──────────────────────────────
      # This MUST happen before `docker compose build` because backend.dockerfile
      # (and others) reference `dspace-containerization-source` with a FROM
      # instruction.  Docker has no way to build this local-only image on its own
      # and will otherwise attempt to pull it from Docker Hub, which fails with
      # "pull access denied".
      - name: Build shared source image (dspace-containerization-source)
        run: |
          docker build -t dspace-containerization-source \
            --build-arg GITHUB_BRANCH=${GITHUB_BRANCH} \
            .

      # ── Step 2: build all compose service images ───────────────────────────
      # DSPACE_VERSION and JDK_VERSION are consumed via the `args:` stanzas in
      # docker-compose.yml; they are already exported from the workflow `env:`
      # block above so docker compose picks them up automatically.
      - name: Build compose service images
        run: docker compose build

      # ── Step 3: start the stack, wait for readiness, run smoke tests ───────
      # `make test` expands to: up (ensure-source + docker compose up -d)
      #                          wait (tests/wait-for-stack.sh)
      #                          tests/smoke.sh
      - name: Start stack, wait for readiness, and run smoke tests
        run: make test

