---
name: Integration smoke tests

# Run manually, or automatically on any push that touches Docker/test files.
on:
  workflow_dispatch:
    inputs:
      dspace_version:
        description: DSpace Version (e.g. 7.6)
        required: true
        default: "7.6"
      jdk_version:
        description: JDK Version (17 recommended)
        required: true
        default: "17"
      github_branch:
        description: Source branch (mlibrary fork)
        required: true
        default: umich

  push:
    paths:
      - "**.dockerfile"
      - "docker-compose.yml"
      - "Dockerfile"
      - "tests/**"
      - ".github/workflows/integration-test.yml"

jobs:
  smoke:
    name: Smoke tests – DSpace ${{ github.event.inputs.dspace_version || '7.6' }}
    runs-on: ubuntu-latest
    # Only run for the canonical repository to avoid wasting runners on forks.
    if: github.repository == 'mlibrary/dspace-containerization'

    env:
      GITHUB_BRANCH: ${{ github.event.inputs.github_branch || 'umich' }}
      DSPACE_VERSION: ${{ github.event.inputs.dspace_version || '7.6' }}
      JDK_VERSION: ${{ github.event.inputs.jdk_version || '17' }}
      BACKEND_URL: http://localhost:8080
      SOLR_URL: http://localhost:8983
      FRONTEND_URL: http://localhost:4000
      MAX_WAIT: "600"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build shared source image
        run: |
          docker build -t dspace-containerization-source \
            --build-arg GITHUB_BRANCH=${GITHUB_BRANCH} .

      - name: Build compose service images
        run: |
          docker compose build \
            --build-arg DSPACE_VERSION=${DSPACE_VERSION} \
            --build-arg JDK_VERSION=${JDK_VERSION}

      # ── Start ──────────────────────────────────────────────────────────────
      - name: Start core services
        run: docker compose up -d

      # ── Wait ───────────────────────────────────────────────────────────────
      - name: Wait for stack to be ready
        run: bash tests/wait-for-stack.sh

      # ── Test ───────────────────────────────────────────────────────────────
      - name: Run smoke tests
        run: bash tests/smoke.sh

      # ── Debug (always runs, even on failure) ───────────────────────────────
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color

