# local.cfg — local development overrides (never commit secrets here)
#
# DSpace loads this file last, so any property here overrides dspace.cfg.
# This file is copied into the image by the root backend.dockerfile (used by
# docker-compose for local development and the ci.yml smoke-test workflow).
# dspace/backend.dockerfile (used to build production/staging images pushed to
# ghcr.io) does NOT copy backend/config/ at all — production/staging
# configuration is supplied at runtime via environment variables or mounted
# Kubernetes Secrets.

# Disable OIDC authentication for local dev.
# authentication.cfg enables OidcAuthentication by default, but OidcAuthenticationBean
# reads ip.bioIPsRange1/2 on EVERY request and crashes with NullPointerException if
# those properties are missing, and weblogin.lib.umich.edu is unavailable locally anyway.
plugin.sequence.org.dspace.authenticate.AuthenticationMethod = org.dspace.authenticate.PasswordAuthentication

# OidcAuthenticationBean is still instantiated by Spring even when removed from the
# authentication plugin sequence above.  Its initialisation / health-check path calls
# String.split() on the values of ip.bioIPsRange1 and ip.bioIPsRange2 unconditionally,
# so a NullPointerException propagates to every /server/api endpoint and the actuator
# when the properties are absent.  Provide harmless non-routable placeholders so the
# bean has a non-null string to split while never matching any real request IP.
ip.bioIPsRange1 = 192.0.2.0/24
ip.bioIPsRange2 = 192.0.2.0/24

